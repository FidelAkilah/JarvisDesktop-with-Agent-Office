<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta
    http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' http://localhost:5173; style-src 'self' 'unsafe-inline' http://localhost:5173; font-src 'self' http://localhost:5173; img-src 'self' data: blob:; connect-src 'self' ws://127.0.0.1:4777 http://localhost:5173 ws://localhost:5173"
  />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>J.A.R.V.I.S</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <header id="hdr">
      <div class="wordmark">J.A.R.V.I.S</div>
      <div id="viewToggle">
        <button class="vbtn active" data-view="core">CORE</button>
        <button class="vbtn" data-view="office">OFFICE</button>
      </div>
      <div class="hdr-status"><span id="linkDot" class="dot"></span><span id="hdrText">establishing link…</span></div>
      <div class="hdr-right">
        <button id="pttBtn" class="hbtn" title="Push to talk (⌘⇧Space)">TALK</button>
        <button id="muteBtn" class="hbtn" title="Mute microphone (⌘⇧M)">MUTE</button>
        <button id="settingsBtn" class="hbtn" title="Settings">⚙</button>
      </div>
    </header>

    <aside id="systems" class="panel">
      <h2 class="panel-title">Agents</h2>
      <div id="roster"></div>
      <h2 class="panel-title gap">Telemetry</h2>
      <div id="gauges">
        <div class="gauge">
          <div class="g-row"><span class="g-label">Response latency</span><span class="g-value" id="gLatency">—</span></div>
          <div class="g-bar"><div id="gLatencyBar"></div></div>
        </div>
        <div class="gauge"><div class="g-row"><span class="g-label">Tokens out</span><span class="g-value" id="gTokens">0</span></div></div>
        <div class="gauge"><div class="g-row"><span class="g-label">Turns</span><span class="g-value" id="gTurns">0</span></div></div>
        <div class="gauge" title="What this session would cost at API prices. Covered by the Max plan — you are not billed."><div class="g-row"><span class="g-label">Max plan usage <span class="g-note">(API-equiv)</span></span><span class="g-value" id="gCost">$0.000</span></div></div>
      </div>
    </aside>

    <main id="core">
      <canvas id="reactor"></canvas>
      <div id="officeMount"></div>
      <div id="coreText">
        <div id="stateLabel">OFFLINE</div>
        <div id="stateSub">waiting for link</div>
      </div>
      <div id="agentDetail" hidden></div>
    </main>

    <aside id="comms" class="panel">
      <h2 class="panel-title">Transcript</h2>
      <div id="transcript"></div>
      <form id="chatForm">
        <input id="chatInput" placeholder="Type to JARVIS…" autocomplete="off" />
        <button type="submit">SEND</button>
      </form>
    </aside>

    <section id="ticker" class="panel">
      <h2 class="panel-title">Event stream</h2>
      <div id="events"></div>
    </section>
  </div>
  <div id="settingsOverlay" hidden>
    <div id="settingsPanel">
      <h2 class="panel-title">Settings</h2>
      <label class="s-row"><span>Brain model</span>
        <select id="sModel">
          <option value="claude-opus-4-8">Opus 4.8 (default)</option>
          <option value="claude-sonnet-4-6">Sonnet 4.6 (faster)</option>
          <option value="claude-haiku-4-5-20251001">Haiku 4.5 (fastest)</option>
        </select>
      </label>
      <label class="s-row"><span>Whisper size</span>
        <select id="sWhisper">
          <option value="tiny">tiny (fastest)</option>
          <option value="base">base (default)</option>
          <option value="small">small (more accurate)</option>
          <option value="medium">medium (most accurate)</option>
        </select>
      </label>
      <label class="s-row"><span>Voice</span>
        <input id="sVoice" placeholder="en_GB-alan-medium" />
      </label>
      <label class="s-row"><span>Wake sensitivity <em id="sWakeVal"></em></span>
        <input id="sWake" type="range" min="0.3" max="0.8" step="0.05" />
      </label>
      <label class="s-row s-check"><input id="sLogin" type="checkbox" /><span>Start JARVIS at login</span></label>
      <div class="s-note" id="sMic"></div>
      <div class="s-actions">
        <button class="hbtn" id="sCancel">CANCEL</button>
        <button class="hbtn" id="sApply">APPLY &amp; RESTART</button>
      </div>
      <div class="s-note" id="sStatus"></div>
    </div>
  </div>
  <div id="scanlines" aria-hidden="true"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
