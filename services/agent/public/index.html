<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>JARVIS — link test</title>
<style>
  :root {
    --bg: #060b10;
    --panel: #0b141c;
    --cyan: #3ee6ff;
    --cyan-dim: #1b7a8c;
    --text: #cfeef5;
    --dim: #5d8794;
    --err: #ff5d6c;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; height: 100vh; display: flex; flex-direction: column;
    background: radial-gradient(ellipse at 50% -20%, #0d1e2a 0%, var(--bg) 60%);
    color: var(--text);
    font: 14px/1.5 "SF Mono", ui-monospace, Menlo, monospace;
  }
  header {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 20px; border-bottom: 1px solid rgba(62,230,255,.15);
  }
  .core {
    width: 14px; height: 14px; border-radius: 50%;
    background: var(--cyan); box-shadow: 0 0 12px var(--cyan);
    animation: pulse 2.4s ease-in-out infinite;
  }
  .core.thinking { animation-duration: .7s; }
  .core.offline { background: var(--err); box-shadow: 0 0 10px var(--err); animation: none; }
  @keyframes pulse { 0%,100% { opacity: .55; } 50% { opacity: 1; } }
  h1 { font-size: 15px; font-weight: 600; letter-spacing: .35em; margin: 0; color: var(--cyan); }
  #status { margin-left: auto; color: var(--dim); font-size: 12px; }
  #log {
    flex: 1; overflow-y: auto; padding: 20px; display: flex;
    flex-direction: column; gap: 10px;
  }
  .msg { max-width: 72ch; padding: 10px 14px; border-radius: 8px; white-space: pre-wrap; }
  .user { align-self: flex-end; background: rgba(62,230,255,.08); border: 1px solid rgba(62,230,255,.25); }
  .jarvis { align-self: flex-start; background: var(--panel); border: 1px solid rgba(62,230,255,.12); }
  .error { align-self: flex-start; border: 1px solid var(--err); color: var(--err); }
  .sys { align-self: center; color: var(--dim); font-size: 12px; }
  form {
    display: flex; gap: 10px; padding: 16px 20px;
    border-top: 1px solid rgba(62,230,255,.15);
  }
  input {
    flex: 1; padding: 12px 14px; border-radius: 8px; outline: none;
    background: var(--panel); border: 1px solid rgba(62,230,255,.25);
    color: var(--text); font: inherit;
  }
  input:focus { border-color: var(--cyan); box-shadow: 0 0 8px rgba(62,230,255,.25); }
  button {
    padding: 12px 22px; border-radius: 8px; border: 1px solid var(--cyan-dim);
    background: rgba(62,230,255,.1); color: var(--cyan); font: inherit; cursor: pointer;
  }
  button:hover { background: rgba(62,230,255,.2); }
</style>
</head>
<body>
  <header>
    <div class="core" id="core"></div>
    <h1>J.A.R.V.I.S</h1>
    <div id="status">connecting…</div>
  </header>
  <div id="log"></div>
  <form id="form">
    <input id="input" placeholder="Say something to JARVIS…" autocomplete="off" autofocus />
    <button type="submit">Send</button>
  </form>

<script>
  const log = document.getElementById('log');
  const core = document.getElementById('core');
  const status = document.getElementById('status');
  const form = document.getElementById('form');
  const input = document.getElementById('input');
  const sessionId = 'ui-' + Math.random().toString(36).slice(2, 8);
  let ws = null;
  let streamingEl = null;

  function add(cls, text) {
    const el = document.createElement('div');
    el.className = 'msg ' + cls;
    el.textContent = text;
    log.appendChild(el);
    log.scrollTop = log.scrollHeight;
    return el;
  }

  function connect() {
    ws = new WebSocket('ws://' + location.host + '/ws');
    ws.onopen = () => { status.textContent = 'link active'; core.className = 'core'; };
    ws.onclose = () => {
      status.textContent = 'link lost — retrying…';
      core.className = 'core offline';
      setTimeout(connect, 2000);
    };
    ws.onmessage = (e) => {
      const msg = JSON.parse(e.data);
      if (msg.type === 'hello') {
        status.textContent = msg.model + (msg.authTokenPresent ? '' : ' · NO TOKEN — see README');
        if (!msg.authTokenPresent) core.className = 'core offline';
      } else if (msg.type === 'assistant_delta') {
        if (!streamingEl) streamingEl = add('jarvis', '');
        streamingEl.textContent += msg.text;
        log.scrollTop = log.scrollHeight;
      } else if (msg.type === 'reply') {
        if (streamingEl) { streamingEl.textContent = msg.text; streamingEl = null; }
        else add('jarvis', msg.text);
        core.className = 'core';
      } else if (msg.type === 'error') {
        streamingEl = null;
        add('error', '⚠ ' + msg.message);
        core.className = 'core offline';
      } else if (msg.type === 'event' && msg.event.state === 'thinking') {
        core.className = 'core thinking';
      }
    };
  }
  connect();

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    const text = input.value.trim();
    if (!text || !ws || ws.readyState !== 1) return;
    add('user', text);
    ws.send(JSON.stringify({ type: 'chat', sessionId, text }));
    input.value = '';
    core.className = 'core thinking';
  });
</script>
</body>
</html>
